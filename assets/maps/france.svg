      <stop offset="0.46" stop-color="#11191b"/>
      <stop offset="1" stop-color="#0b1214"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.75"/>
    </filter>
    <filter id="goldGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="noiseDots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="8" r=".75" fill="#ffffff" opacity=".045"/>
      <circle cx="25" cy="19" r=".55" fill="#ffffff" opacity=".035"/>
    </pattern>
  </defs>

