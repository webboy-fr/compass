    <radialGradient id="seaGlow" cx="50%" cy="48%" r="72%">
      <stop offset="0" stop-color="#07111a" stop-opacity="1"/>
      <stop offset="0.60" stop-color="#02060a" stop-opacity="1"/>
      <stop offset="1" stop-color="#000000" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="land" x1="18%" y1="8%" x2="82%" y2="94%">
