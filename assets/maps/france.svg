  <title id="title">Carte vectorielle officielle stylisée de la France métropolitaine</title>
  <desc id="desc">Carte vectorielle sombre de la France métropolitaine, avec silhouette détaillée, Corse, fond noir et décor discret.</desc>
  <!-- Geometry reference: public-domain Wikimedia Commons France department SVG family, simplified and restyled for the game. Coordinate projection: lon/lat-like normalized canvas, lon [-5.35,10.13], lat [41.02,51.27]. -->
